name: Deploy Cloudflare Email Worker

on:
  push:
    branches: [master]
    paths:
      - 'cloudflare-email-worker/**'
      - '.github/workflows/deploy-email-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudflare-email-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloudflare-email-worker/package-lock.json
      - run: npm ci
      - name: Deploy with wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: cloudflare-email-worker
      - name: Confirm
        run: echo '✅ Cloudflare Email Worker deployed (${{ github.sha }})'
